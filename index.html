<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MŚ 2026 - Typer & Karty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏆 MŚ 2026 - Ekipa</h1>
        <div id="user-info">
            <button id="login-btn">Zaloguj się przez Google</button>
            <div id="logged-in-ui" style="display: none;">
                <span id="user-name"></span>
                <button id="logout-btn">Wyloguj</button>
            </div>
        </div>
    </header>

    <main id="main-content" style="display: none;">
        <section id="schedule">
            <h2>📅 Terminarz LIVE</h2>
            <div id="matches-container">
                </div>
        </section>

        <section id="betting">
            <h2>🎯 Obstawianie</h2>
            <form id="bet-form">
                <p>Polska vs Meksyk</p>
                <input type="number" id="home-score" min="0" placeholder="Polska" required> : 
                <input type="number" id="away-score" min="0" placeholder="Meksyk" required>
                <button type="submit">Zapisz typ</button>
            </form>
            <div id="my-bets"></div>
        </section>

        <section id="packs">
            <h2>📦 Otwórz Paczkę (100 pkt)</h2>
            <button id="open-pack-btn">Otwórz paczkę!</button>
            <div id="pack-result"></div>
            <h3>Twoje Karty:</h3>
            <ul id="my-cards-list"></ul>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
